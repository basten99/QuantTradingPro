# FAQ
faq:
  - question: "How do I become a sponsor?"
    answer: "Click the 'Sponsor' button on our GitHub repository or contact us directly for corporate sponsorship."
  
  - question: "Can I sponsor for just one month?"
    answer: "Yes, you can cancel anytime. However, some benefits require continuous sponsorship."
  
  - question: "Are sponsorships tax-deductible?"
    answer: "For individuals, please consult your tax advisor. For companies, sponsorship may be considered a business expense."
  
  - question: "How are funds distributed?"
    answer: "See the 'fund_usage' section above. We publish monthly transparency reports."
  
  - question: "Can I remain anonymous?"
    answer: "Yes, you can choose to be an anonymous sponsor through GitHub Sponsors."


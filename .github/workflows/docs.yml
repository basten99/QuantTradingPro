name: Docs

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'examples/**'
  schedule:
    - cron: '0 0 * * 0'  # 每周日午夜运行

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install sphinx sphinx-rtd-theme nbsphinx myst-parser sphinx-autodoc-typehints
    
    - name: Build documentation
      run: |
        cd docs
        make html
        make linkcheck
    
    - name: Upload documentation artifact
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/_build/html/

  deploy-docs:
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: write
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download documentation artifact
      uses: actions/download-artifact@v4
      with:
        name: documentation
        path: ./_site
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './_site'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  update-examples:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install jupyter nbconvert
    
    - name: Update example notebooks
      run: |
        python scripts/update_examples.py
    
    - name: Commit updated examples
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add examples/
        git commit -m "Update example notebooks [skip ci]" || echo "No changes to commit"
        git push

  check-dead-links:
    runs-on: ubuntu-latest
    if: false  # Disabled - site not deployed yet
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    
    - name: Install link checking tools
      run: |
        python -m pip install --upgrade pip
        pip install linkchecker
    
    - name: Check for dead links
      run: |
        linkchecker https://basten99.github.io/QuantTradingPro/ \
          --check-extern \
          --no-robots \
          --timeout 10 \
          --verbose \
          --output linkchecker.out
    
    - name: Upload link check report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: linkchecker-report
        path: linkchecker.out